<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Интерактивная карта</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --sidebar-bg: #1e293b;
            --card-bg: #334155;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
            --border-color: #334155;
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            background-color: var(--bg-color);
            color: var(--text-primary);
        }

        .app-container {
            display: flex;
            width: 100%;
            height: 100%;
            position: relative;
        }

        .sidebar {
            width: 320px;
            background-color: var(--sidebar-bg);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 4px 0 24px rgba(0, 0, 0, 0.4);
            z-index: 10;
            flex-shrink: 0;
            border-right: 1px solid var(--border-color);
        }

        .tags-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--card-bg) transparent;
        }

        .tags-section::-webkit-scrollbar {
            width: 6px;
        }

        .tags-section::-webkit-scrollbar-thumb {
            background-color: var(--card-bg);
            border-radius: 10px;
        }

        .controls-section {
            padding: 24px;
            flex-shrink: 0;
            background: rgba(15, 23, 42, 0.3);
            border-top: 1px solid var(--border-color);
        }

        .menu-header {
            padding: 24px 24px 12px;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 700;
            color: var(--text-secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }

        .add-map-btn,
        .add-mark-btn,
        .add-tag-btn {
            background: var(--accent-color);
            border: none;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.3);
            position: relative;
        }

        .add-map-btn:hover::after,
        .add-mark-btn:hover::after,
        .add-tag-btn:hover::after {
            content: attr(data-tooltip);
            position: absolute;
            right: 100%;
            top: 50%;
            transform: translateY(-50%);
            background: #0f172a;
            color: white;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 12px;
            white-space: nowrap;
            pointer-events: none;
            margin-right: 12px;
            z-index: 30;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-color);
        }

        .add-map-btn:hover,
        .add-mark-btn:hover,
        .add-tag-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4);
        }

        .section-content {
            padding: 8px 16px 24px;
            min-height: 60px;
        }

        .icons-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .icon-item {
            width: 100%;
            aspect-ratio: 1/1;
            background: var(--card-bg);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
            transition: var(--transition);
            border: 1px solid transparent;
        }

        .icon-item:active {
            cursor: grabbing;
        }

        .icon-item:hover {
            transform: scale(1.05);
            background: #3f4e63;
            border-color: var(--accent-color);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.2);
        }

        .icon-item img {
            width: 70%;
            height: 70%;
            object-fit: contain;
            pointer-events: none;
        }

        .filter-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9375rem;
            padding: 10px 14px;
            background: var(--card-bg);
            border-radius: 12px;
            gap: 12px;
            margin-bottom: 8px;
            transition: var(--transition);
            border: 1px solid transparent;
        }

        .filter-item:hover {
            background-color: #3f4e63;
            border-color: var(--accent-color);
        }

        .filter-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .filter-info label {
            flex: 1;
            font-weight: 500;
            cursor: pointer;
            color: var(--text-primary);
        }

        .filter-info input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--accent-color);
            border-radius: 4px;
        }

        .tag-actions {
            display: flex;
            gap: 4px;
        }

        .edit-tag-btn,
        .delete-tag-btn {
            background: rgba(255, 255, 255, 0.05);
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 14px;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .edit-tag-btn:hover {
            background: var(--accent-color);
            color: white;
        }

        .delete-tag-btn:hover {
            background: var(--danger-color);
            color: white;
        }

        .empty-message {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.875rem;
            padding: 20px 0;
            font-style: italic;
        }

        .zoom-status {
            text-align: center;
            padding: 10px 16px;
            font-size: 0.8125rem;
            background-color: rgba(15, 23, 42, 0.6);
            border-radius: 10px;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            cursor: pointer;
            margin-bottom: 16px;
            color: var(--accent-color);
            border: 1px solid rgba(59, 130, 246, 0.2);
            transition: var(--transition);
        }

        .zoom-status:hover {
            background-color: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }

        .export-import-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .export-btn,
        .import-btn {
            width: 100%;
            height: 44px;
            border: none;
            color: white;
            padding: 0 16px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9375rem;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .export-btn {
            background: linear-gradient(135deg, #059669 0%, #10b981 100%);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
        }

        .export-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3);
            filter: brightness(1.1);
        }

        .import-btn {
            background: linear-gradient(135deg, #d97706 0%, #f59e0b 100%);
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.2);
        }

        .import-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(245, 158, 11, 0.3);
            filter: brightness(1.1);
        }

        .map-container {
            flex: 1;
            background-color: var(--bg-color);
            position: relative;
            overflow: hidden;
            cursor: grab;
            background-image: 
                radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0);
            background-size: 32px 32px;
        }

        .map-container:active {
            cursor: grabbing;
        }

        .map-viewport {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        .map-image {
            position: absolute;
            transform-origin: 0 0;
            will-change: transform;
            pointer-events: none;
            filter: drop-shadow(0 20px 50px rgba(0,0,0,0.5));
        }

        .buttons-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: auto;
            z-index: 10;
        }

        .map-button {
            position: absolute;
            cursor: pointer;
            background: transparent;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 20;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }

        .map-button:hover {
            transform: scale(1.2) translateY(-5px);
            z-index: 30;
        }

        .map-button img {
            width: 90%;
            height: 90%;
            object-fit: contain;
            pointer-events: none;
        }

        .map-button.hidden {
            display: none;
        }

        /* Кастомный тултип */
        .custom-tooltip {
            position: fixed;
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 16px;
            max-width: 300px;
            min-width: 200px;
            z-index: 1000;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2), 0 10px 10px -5px rgba(0, 0, 0, 0.1);
            pointer-events: none;
            animation: tooltipAppear 0.2s ease-out;
        }

        @keyframes tooltipAppear {
            from { opacity: 0; transform: translateY(10px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .custom-tooltip .tooltip-title {
            font-size: 1.125rem;
            font-weight: 700;
            color: #ff8c42;
            text-align: center;
            margin-bottom: 8px;
            word-wrap: break-word;
        }

        .custom-tooltip .tooltip-divider {
            height: 1px;
            background: var(--border-color);
            margin: 12px 0;
        }

        .custom-tooltip .tooltip-desc {
            font-size: 0.875rem;
            color: var(--text-secondary);
            line-height: 1.5;
            word-wrap: break-word;
            white-space: pre-line;
        }

        .custom-tooltip .tooltip-extra {
            margin-top: 16px;
            padding: 10px;
            font-size: 0.8125rem;
            color: var(--accent-color);
            word-break: break-word;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: 100%;
            text-align: center;
            border-radius: 8px;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        .custom-tooltip .tooltip-extra:hover {
            background: rgba(59, 130, 246, 0.2);
            color: white;
            border-color: var(--accent-color);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(4px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            transition: opacity 0.3s ease;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--sidebar-bg);
            color: var(--text-primary);
            padding: 32px;
            border-radius: 24px;
            width: 440px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
            animation: modalSlideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes modalSlideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-content h3 {
            margin-bottom: 24px;
            text-align: left;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .modal-content label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.8125rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.025em;
        }

        .modal-content input,
        .modal-content textarea,
        .modal-content select {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: var(--bg-color);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.9375rem;
            transition: var(--transition);
        }

        .modal-content input:focus,
        .modal-content textarea:focus,
        .modal-content select:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .modal-content input[type="range"] {
            padding: 0;
            height: 6px;
            background: var(--border-color);
            accent-color: var(--accent-color);
            cursor: pointer;
        }

        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            background: var(--bg-color);
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .checkbox-row label {
            margin-bottom: 0;
            cursor: pointer;
            text-transform: none;
            font-size: 0.875rem;
            color: var(--text-primary);
        }

        .checkbox-row input {
            width: 20px;
            height: 20px;
            margin: 0;
            cursor: pointer;
            accent-color: var(--accent-color);
        }

        .delete-btn {
            background-color: transparent;
            color: var(--danger-color);
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            margin-bottom: 24px;
            transition: var(--transition);
        }

        .delete-btn:hover {
            background-color: var(--danger-color);
            color: white;
            border-color: var(--danger-color);
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .modal-buttons button {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9375rem;
            transition: var(--transition);
        }

        .save-btn {
            background: var(--accent-color);
            color: white;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.3);
        }

        .save-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4);
        }

        .cancel-btn {
            background: var(--card-bg);
            color: var(--text-primary);
        }

        .cancel-btn:hover {
            background: #3f4e63;
        }

        /* Контекстное меню */
        .context-menu {
            position: fixed;
            background: var(--sidebar-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 6px;
            z-index: 3000;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
            min-width: 180px;
            animation: contextMenuAppear 0.15s ease-out;
        }

        @keyframes contextMenuAppear {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .context-menu-item {
            padding: 10px 12px;
            cursor: pointer;
            border-radius: 8px;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            color: var(--text-primary);
            transition: var(--transition);
        }

        .context-menu-item:hover {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger-color);
        }
    </style>
</head>

<body>
    <div class="app-container">
        <div class="sidebar">
            <div class="tags-section">
                <div class="menu-header">
                    <span style="display:flex; align-items:center; gap:8px">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>
                        Карта
                    </span>
                    <button class="add-map-btn" id="addMapBtn" data-tooltip="Загрузить карту">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    </button>
                </div>
                <div class="section-content" id="mapSection">
                    <div id="mapEmpty" class="empty-message">Нет карты. Нажмите + чтобы загрузить</div>
                    <div id="mapLoaded" style="display: none;">
                        <div style="background:#2c2e3e;border-radius:12px;padding:10px;text-align:center;">✅ Карта
                            загружена</div>
                    </div>
                </div>

                <div class="menu-header">
                    <span style="display:flex; align-items:center; gap:8px">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                        Метки
                    </span>
                    <button class="add-mark-btn" id="addMarkBtn" data-tooltip="Добавить метку">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    </button>
                </div>
                <div class="section-content" id="marksSection">
                    <div id="marksEmpty" class="empty-message">Нет меток. Нажмите + чтобы добавить</div>
                    <div class="icons-grid" id="iconsGrid" style="display: none;"></div>
                </div>

                <div class="menu-header">
                    <span style="display:flex; align-items:center; gap:8px">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
                        Теги
                    </span>
                    <button class="add-tag-btn" id="addTagBtnMenu" data-tooltip="Добавить тег">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    </button>
                </div>
                <div class="section-content" id="tagsSection">
                    <div id="tagsEmpty" class="empty-message">Нет тегов. Нажмите + чтобы добавить</div>
                    <div id="tagsList" style="display: none;"></div>
                </div>
            </div>
            <div class="controls-section">
                <div class="zoom-status" id="zoomStatusLabel">Zoom: 1.00x</div>
                <div class="export-import-buttons">
                    <button class="export-btn" id="exportBtn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                        Экспорт проекта
                    </button>
                    <button class="import-btn" id="importBtn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        Импорт проекта
                    </button>
                </div>
            </div>
        </div>

        <div class="map-container" id="mapContainer">
            <div class="map-viewport" id="mapViewport">
                <img class="map-image" id="mapImage" style="display: none;" draggable="false">
                <div class="buttons-layer" id="buttonsLayer"></div>
            </div>
        </div>
    </div>

    <div class="modal" id="editModal">
        <div class="modal-content">
            <h3>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right:12px; vertical-align: middle; color: var(--accent-color)"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                Редактирование
            </h3>
            <label>Название</label>
            <input type="text" id="editName" placeholder="Название">
            <label>Тег</label>
            <select id="editTag"></select>
            <label>Описание</label>
            <textarea id="editDesc" placeholder="Описание"></textarea>
            <div class="checkbox-row">
                <input type="checkbox" id="editShowExtraCheckbox">
                <label for="editShowExtraCheckbox">Показывать доп. текст в тултипе</label>
            </div>
            <label>Доп. текст (кликабельный для копирования)</label>
            <textarea id="editExtraText" placeholder="Текст, который появится в тултипе при включенном чекбоксе"
                rows="2"></textarea>
            <label>Размер: <span id="sizeValueLabel">50</span>px</label>
            <input type="range" id="editSize" min="20" max="100" step="2" value="50">
            <button class="delete-btn" id="deleteButtonBtn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right:8px"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
                Удалить метку
            </button>
            <div class="modal-buttons">
                <button class="cancel-btn" id="modalCancel">Отмена</button>
                <button class="save-btn" id="modalSave">Сохранить</button>
            </div>
        </div>
    </div>

    <script>
        let scale = 1.0;
        let translateX = 0, translateY = 0;
        let isDragging = false;
        let dragStartX = 0, dragStartY = 0;
        let dragStartTranslateX = 0, dragStartTranslateY = 0;
        let imgNaturalWidth = 1, imgNaturalHeight = 1;
        let imgLoaded = false;
        let currentMapBase64 = null;

        let buttonsData = [];
        let nextId = 1;
        let availableTags = [];
        let tagCheckState = {};
        let currentEditingButton = null;
        let iconItems = [];
        let nextIconId = 1;

        let activeTooltip = null;
        let activeButton = null;
        let isPinned = false;

        const mapContainer = document.getElementById('mapContainer');
        const mapImage = document.getElementById('mapImage');
        const buttonsLayer = document.getElementById('buttonsLayer');
        const zoomLabel = document.getElementById('zoomStatusLabel');
        const tagsList = document.getElementById('tagsList');
        const tagsEmpty = document.getElementById('tagsEmpty');
        const iconsGrid = document.getElementById('iconsGrid');
        const marksEmpty = document.getElementById('marksEmpty');
        const mapEmpty = document.getElementById('mapEmpty');
        const mapLoaded = document.getElementById('mapLoaded');

        const MIN_SCALE = 0.5, MAX_SCALE = 3.0;

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                const toast = document.createElement('div');
                toast.innerHTML = `${text.length > 40 ? text.substring(0, 40) + '...' : text}`;
                toast.style.position = 'fixed';
                toast.style.bottom = '32px';
                toast.style.left = '50%';
                toast.style.transform = 'translateX(-50%) translateY(20px)';
                toast.style.backgroundColor = 'var(--sidebar-bg)';
                toast.style.color = 'var(--text-primary)';
                toast.style.padding = '12px 24px';
                toast.style.borderRadius = '12px';
                toast.style.zIndex = '3000';
                toast.style.fontSize = '0.875rem';
                toast.style.fontWeight = '600';
                toast.style.boxShadow = '0 20px 25px -5px rgba(0, 0, 0, 0.2)';
                toast.style.border = '1px solid var(--border-color)';
                toast.style.pointerEvents = 'none';
                toast.style.transition = 'all 0.3s cubic-bezier(0.4, 0, 0.2, 1)';
                toast.style.opacity = '0';
                document.body.appendChild(toast);
                
                requestAnimationFrame(() => {
                    toast.style.transform = 'translateX(-50%) translateY(0)';
                    toast.style.opacity = '1';
                });

                setTimeout(() => {
                    toast.style.transform = 'translateX(-50%) translateY(20px)';
                    toast.style.opacity = '0';
                    setTimeout(() => toast.remove(), 300);
                }, 2000);
            }).catch(() => alert('Не удалось скопировать текст'));
        }

        function hideTooltip() {
            if (activeTooltip) {
                activeTooltip.remove();
                activeTooltip = null;
                activeButton = null;
            }
            isPinned = false;
        }

        function showTooltip(btnData, mouseX, mouseY, isClick = false) {
            if (activeTooltip && activeButton !== btnData && !isClick) {
                hideTooltip();
            }
            if (isClick && activeButton === btnData && activeTooltip) {
                hideTooltip();
                return;
            }
            if (isClick && activeButton !== btnData) {
                hideTooltip();
            }

            const tooltip = document.createElement('div');
            tooltip.className = 'custom-tooltip';

            const title = document.createElement('div');
            title.className = 'tooltip-title';
            title.textContent = btnData.name || 'Метка';

            const divider = document.createElement('div');
            divider.className = 'tooltip-divider';

            const desc = document.createElement('div');
            desc.className = 'tooltip-desc';
            desc.textContent = btnData.description || 'Нет описания';

            tooltip.appendChild(title);
            tooltip.appendChild(divider);
            tooltip.appendChild(desc);

            if (btnData.showExtraText && btnData.extraText && btnData.extraText.trim() !== '') {
                const extraDiv = document.createElement('div');
                extraDiv.className = 'tooltip-extra';
                extraDiv.innerHTML = `<span>${btnData.extraText}</span>`;
                extraDiv.title = 'Нажмите, чтобы скопировать';
                extraDiv.addEventListener('click', (e) => {
                    e.stopPropagation();
                    copyToClipboard(btnData.extraText);
                });
                tooltip.appendChild(extraDiv);
            }

            document.body.appendChild(tooltip);

            const tooltipRect = tooltip.getBoundingClientRect();
            let left = mouseX + 15;
            let top = mouseY - tooltipRect.height / 2;

            if (left + tooltipRect.width > window.innerWidth) {
                left = mouseX - tooltipRect.width - 15;
            }
            if (top < 0) {
                top = 5;
            }
            if (top + tooltipRect.height > window.innerHeight) {
                top = window.innerHeight - tooltipRect.height - 5;
            }

            tooltip.style.left = left + 'px';
            tooltip.style.top = top + 'px';

            activeTooltip = tooltip;
            activeButton = btnData;
            if (isClick) {
                isPinned = true;
                tooltip.style.pointerEvents = 'auto';
            }
        }

        function hideTooltipOnEmptyClick(e) {
            if (isPinned) {
                if (!e.target.closest('.map-button')) {
                    hideTooltip();
                }
                return;
            }
            hideTooltip();
        }

        function updateTooltipPositionOnScroll() {
            if (activeTooltip && activeButton && activeButton.element) {
                const rect = activeButton.element.getBoundingClientRect();
                const mouseX = rect.left + rect.width / 2;
                const mouseY = rect.top;
                const tooltipRect = activeTooltip.getBoundingClientRect();
                let left = mouseX + 15;
                let top = mouseY - tooltipRect.height / 2;
                if (left + tooltipRect.width > window.innerWidth) {
                    left = mouseX - tooltipRect.width - 15;
                }
                if (top < 0) {
                    top = 5;
                }
                if (top + tooltipRect.height > window.innerHeight) {
                    top = window.innerHeight - tooltipRect.height - 5;
                }
                activeTooltip.style.left = left + 'px';
                activeTooltip.style.top = top + 'px';
            }
        }

        let contextMenu = null;
        function showContextMenu(x, y, iconId) {
            if (contextMenu) contextMenu.remove();
            contextMenu = document.createElement('div');
            contextMenu.className = 'context-menu';
            contextMenu.style.left = x + 'px';
            contextMenu.style.top = y + 'px';

            const deleteItem = document.createElement('div');
            deleteItem.className = 'context-menu-item';
            deleteItem.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:8px"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg> Удалить метку';
            deleteItem.onclick = () => {
                deleteIconItem(iconId);
                contextMenu.remove();
                contextMenu = null;
            };

            contextMenu.appendChild(deleteItem);
            document.body.appendChild(contextMenu);

            setTimeout(() => {
                document.addEventListener('click', function removeMenu() {
                    if (contextMenu) contextMenu.remove();
                    contextMenu = null;
                    document.removeEventListener('click', removeMenu);
                });
            }, 0);
        }

        function deleteIconItem(iconId) {
            const index = iconItems.findIndex(item => item.id === iconId);
            if (index !== -1) {
                const iconUrl = iconItems[index].iconUrl;
                iconItems.splice(index, 1);
                
                // Удаляем все метки с этой иконкой с карты
                for (let i = buttonsData.length - 1; i >= 0; i--) {
                    if (buttonsData[i].iconUrl === iconUrl) {
                        if (buttonsData[i].element) {
                            buttonsData[i].element.remove();
                        }
                        buttonsData.splice(i, 1);
                    }
                }
                
                renderIconsGrid();
                if (activeTooltip) hideTooltip();
            }
        }

        function updateTransform() {
            if (!imgLoaded) return;
            scale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, scale));
            mapImage.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
            zoomLabel.innerText = `Zoom: ${scale.toFixed(2)}x`;
            updateButtonsPosition();
            updateTooltipPositionOnScroll();
        }

        function screenToImage(screenX, screenY) {
            return { x: (screenX - translateX) / scale, y: (screenY - translateY) / scale };
        }

        function imageToScreen(imgX, imgY) {
            return { x: imgX * scale + translateX, y: imgY * scale + translateY };
        }

        function updateButtonsPosition() {
            buttonsData.forEach(btn => {
                if (btn.element && imgLoaded) {
                    const pos = imageToScreen(btn.x, btn.y);
                    const size = btn.size || 50;
                    btn.element.style.left = `${pos.x - size / 2}px`;
                    btn.element.style.top = `${pos.y - size}px`;
                    btn.element.style.width = `${size}px`;
                    btn.element.style.height = `${size}px`;
                }
            });
            updateTooltipPositionOnScroll();
        }

        function renderIconsGrid() {
            if (iconItems.length === 0) {
                iconsGrid.style.display = 'none';
                marksEmpty.style.display = 'block';
            } else {
                iconsGrid.style.display = 'grid';
                marksEmpty.style.display = 'none';
                iconsGrid.innerHTML = '';
                iconItems.forEach((item) => {
                    const iconDiv = document.createElement('div');
                    iconDiv.className = 'icon-item';
                    iconDiv.setAttribute('data-icon-id', item.id);
                    iconDiv.setAttribute('draggable', 'true');
                    const img = document.createElement('img');
                    img.src = item.iconUrl;
                    img.alt = 'метка';
                    iconDiv.appendChild(img);
                    iconDiv.title = item.name || 'Метка';

                    iconDiv.addEventListener('dragstart', (e) => {
                        e.dataTransfer.setData('text/plain', JSON.stringify({
                            iconId: item.id,
                            iconUrl: item.iconUrl,
                            name: item.name || 'Метка',
                            description: item.description || '',
                            tag: item.tag,
                            extraText: item.extraText || '',
                            showExtraText: item.showExtraText || false
                        }));
                        e.dataTransfer.effectAllowed = 'copy';
                        iconDiv.style.opacity = '0.5';
                    });
                    iconDiv.addEventListener('dragend', (e) => {
                        iconDiv.style.opacity = '1';
                    });

                    iconDiv.addEventListener('contextmenu', (e) => {
                        e.preventDefault();
                        showContextMenu(e.clientX, e.clientY, item.id);
                    });

                    iconsGrid.appendChild(iconDiv);
                });
            }
        }

        function renderTagsMenu() {
            if (availableTags.length === 0) {
                tagsList.style.display = 'none';
                tagsEmpty.style.display = 'block';
            } else {
                tagsList.style.display = 'block';
                tagsEmpty.style.display = 'none';
                tagsList.innerHTML = '';
                availableTags.forEach(tag => {
                    const isChecked = tagCheckState[tag] !== false;
                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'filter-item';
                    const infoDiv = document.createElement('div');
                    infoDiv.className = 'filter-info';
                    const cb = document.createElement('input');
                    cb.type = 'checkbox';
                    cb.checked = isChecked;
                    cb.addEventListener('change', (e) => {
                        tagCheckState[tag] = e.target.checked;
                        updateFilter();
                    });
                    const label = document.createElement('label');
                    label.textContent = tag;
                    infoDiv.appendChild(cb);
                    infoDiv.appendChild(label);
                    const actionsDiv = document.createElement('div');
                    actionsDiv.className = 'tag-actions';
                    const editBtn = document.createElement('button');
                    editBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
                    editBtn.className = 'edit-tag-btn';
                    editBtn.onclick = () => {
                        const newName = prompt('Редактировать тег (макс 8 символов):', tag);
                        if (newName && newName.trim() && newName.trim().length <= 8 && newName.trim() !== tag) {
                            const oldTag = tag;
                            const newTag = newName.trim();
                            if (!availableTags.includes(newTag)) {
                                const index = availableTags.indexOf(oldTag);
                                if (index !== -1) availableTags[index] = newTag;
                                buttonsData.forEach(btn => { if (btn.tag === oldTag) btn.tag = newTag; });
                                iconItems.forEach(icon => { if (icon.tag === oldTag) icon.tag = newTag; });
                                if (tagCheckState[oldTag] !== undefined) {
                                    tagCheckState[newTag] = tagCheckState[oldTag];
                                    delete tagCheckState[oldTag];
                                }
                                renderTagsMenu();
                                updateTagSelect();
                                updateFilter();
                            } else alert('Тег уже существует!');
                        } else if (newName && newName.trim().length > 8) alert('Максимум 8 символов!');
                    };
                    const deleteBtn = document.createElement('button');
                    deleteBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>';
                    deleteBtn.className = 'delete-tag-btn';
                    deleteBtn.onclick = () => {
                        if (confirm(`Удалить тег "${tag}"? Метки с этим тегом станут без тега`)) {
                            const index = availableTags.indexOf(tag);
                            if (index !== -1) availableTags.splice(index, 1);
                            delete tagCheckState[tag];
                            buttonsData.forEach(btn => { if (btn.tag === tag) btn.tag = ''; });
                            iconItems.forEach(icon => { if (icon.tag === tag) icon.tag = ''; });
                            renderTagsMenu();
                            updateTagSelect();
                            updateFilter();
                        }
                    };
                    actionsDiv.appendChild(editBtn);
                    actionsDiv.appendChild(deleteBtn);
                    itemDiv.appendChild(infoDiv);
                    itemDiv.appendChild(actionsDiv);
                    tagsList.appendChild(itemDiv);
                });
            }
        }

        function updateTagSelect() {
            const select = document.getElementById('editTag');
            if (!select) return;
            select.innerHTML = '';
            const option = document.createElement('option');
            option.value = '';
            option.textContent = 'Без тега';
            select.appendChild(option);
            availableTags.forEach(tag => {
                const opt = document.createElement('option');
                opt.value = tag;
                opt.textContent = tag;
                select.appendChild(opt);
            });
        }

        function updateFilter() {
            buttonsData.forEach(btn => {
                if (btn.element) {
                    const shouldShow = btn.tag === '' || tagCheckState[btn.tag] !== false;
                    if (shouldShow) btn.element.classList.remove('hidden');
                    else btn.element.classList.add('hidden');
                }
            });
        }

        function createButtonElement(btnData) {
            const div = document.createElement('div');
            div.className = 'map-button';
            const shouldShow = btnData.tag === '' || tagCheckState[btnData.tag] !== false;
            if (!shouldShow) div.classList.add('hidden');
            div.setAttribute('data-id', btnData.id);
            const img = document.createElement('img');
            img.src = btnData.iconUrl;
            div.appendChild(img);

            div.addEventListener('mouseenter', (e) => {
                if (!isPinned) {
                    const rect = div.getBoundingClientRect();
                    showTooltip(btnData, rect.left + rect.width / 2, rect.top, false);
                }
            });
            div.addEventListener('mouseleave', () => {
                if (!isPinned) hideTooltip();
            });
            div.addEventListener('click', (e) => {
                e.stopPropagation();
                const rect = div.getBoundingClientRect();
                showTooltip(btnData, rect.left + rect.width / 2, rect.top, true);
            });
            div.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                e.stopPropagation();
                hideTooltip();
                openEditModal(btnData.id);
            });
            div.addEventListener('mousedown', (e) => {
                if (e.button === 0) {
                    e.stopPropagation();
                    startDragButton(e, btnData);
                }
            });
            if (imgLoaded) {
                const pos = imageToScreen(btnData.x, btnData.y);
                const size = btnData.size || 50;
                div.style.left = `${pos.x - size / 2}px`;
                div.style.top = `${pos.y - size}px`;
            }
            div.style.position = 'absolute';
            return div;
        }

        function startDragButton(e, btnData) {
            hideTooltip();
            e.preventDefault();
            e.stopPropagation();
            let startX = e.clientX, startY = e.clientY;
            let startImgX = btnData.x, startImgY = btnData.y;
            function onMouseMove(moveEvent) {
                const deltaX = moveEvent.clientX - startX;
                const deltaY = moveEvent.clientY - startY;
                const newScreenX = (startImgX * scale + translateX) + deltaX;
                const newScreenY = (startImgY * scale + translateY) + deltaY;
                const newImgCoords = screenToImage(newScreenX, newScreenY);
                btnData.x = Math.min(Math.max(newImgCoords.x, 5), imgNaturalWidth - 5);
                btnData.y = Math.min(Math.max(newImgCoords.y, 5), imgNaturalHeight - 5);
                updateButtonsPosition();
            }
            function onMouseUp() {
                document.removeEventListener('mousemove', onMouseMove);
                document.removeEventListener('mouseup', onMouseUp);
            }
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup', onMouseUp);
        }

        function addButtonToMap(x, y, name, tag, description, iconUrl, extraText = '', showExtraText = false) {
            const selectedTag = tag || '';
            const id = nextId++;
            const btnData = { id, x, y, name: name || 'Метка', tag: selectedTag, description: description || '', size: 50, iconUrl, extraText: extraText || '', showExtraText: !!showExtraText, element: null };
            const element = createButtonElement(btnData);
            btnData.element = element;
            buttonsLayer.appendChild(element);
            buttonsData.push(btnData);
            updateButtonsPosition();
            return btnData;
        }

        function updateButtonData(id, newName, newTag, newDesc, newSize, newExtraText, newShowExtra) {
            const btn = buttonsData.find(b => b.id === id);
            if (btn) {
                btn.name = newName;
                btn.tag = newTag;
                btn.description = newDesc;
                btn.size = newSize;
                btn.extraText = newExtraText || '';
                btn.showExtraText = !!newShowExtra;
                if (btn.element) {
                    updateButtonsPosition();
                    updateFilter();
                }
            }
        }

        function deleteButton(id) {
            const index = buttonsData.findIndex(b => b.id === id);
            if (index !== -1) {
                buttonsData[index].element?.remove();
                buttonsData.splice(index, 1);
                closeModal();
                hideTooltip();
            }
        }

        function openEditModal(buttonId) {
            hideTooltip();
            const btn = buttonsData.find(b => b.id === buttonId);
            if (!btn) return;
            currentEditingButton = btn;
            document.getElementById('editName').value = btn.name || '';
            document.getElementById('editTag').value = btn.tag || '';
            document.getElementById('editDesc').value = btn.description || '';
            document.getElementById('editExtraText').value = btn.extraText || '';
            document.getElementById('editShowExtraCheckbox').checked = !!btn.showExtraText;
            const slider = document.getElementById('editSize');
            slider.value = btn.size || 50;
            document.getElementById('sizeValueLabel').innerText = slider.value;
            slider.oninput = function () { document.getElementById('sizeValueLabel').innerText = this.value; };
            document.getElementById('editModal').classList.add('active');
        }

        function closeModal() { document.getElementById('editModal').classList.remove('active'); currentEditingButton = null; }
        function saveCurrentButton() {
            if (currentEditingButton) {
                updateButtonData(
                    currentEditingButton.id,
                    document.getElementById('editName').value,
                    document.getElementById('editTag').value,
                    document.getElementById('editDesc').value,
                    parseInt(document.getElementById('editSize').value, 10),
                    document.getElementById('editExtraText').value,
                    document.getElementById('editShowExtraCheckbox').checked
                );
                closeModal();
            }
        }

        function loadMap(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                currentMapBase64 = e.target.result;
                mapImage.src = currentMapBase64;
                mapImage.onload = () => {
                    imgNaturalWidth = mapImage.naturalWidth;
                    imgNaturalHeight = mapImage.naturalHeight;
                    imgLoaded = true;
                    mapImage.style.display = 'block';
                    mapEmpty.style.display = 'none';
                    mapLoaded.style.display = 'block';
                    scale = 1.0;
                    const rect = mapContainer.getBoundingClientRect();
                    translateX = (rect.width - imgNaturalWidth) / 2;
                    translateY = (rect.height - imgNaturalHeight) / 2;
                    updateTransform();
                };
            };
            reader.readAsDataURL(file);
        }

        function handleWheel(e) {
            e.preventDefault();
            if (!imgLoaded) return;
            const delta = -e.deltaY;
            const zoomFactor = delta > 0 ? 1.08 : 0.93;
            let ns = scale * zoomFactor;
            ns = Math.min(MAX_SCALE, Math.max(MIN_SCALE, ns));
            if (ns === scale) return;
            const rect = mapContainer.getBoundingClientRect();
            const mx = e.clientX - rect.left, my = e.clientY - rect.top;
            const ix = (mx - translateX) / scale, iy = (my - translateY) / scale;
            scale = ns;
            translateX = mx - ix * scale;
            translateY = my - iy * scale;
            updateTransform();
        }

        function onMouseDown(e) {
            if (e.button !== 0 || e.target.closest('.map-button')) return;
            e.preventDefault();
            isDragging = true;
            dragStartX = e.clientX;
            dragStartY = e.clientY;
            dragStartTranslateX = translateX;
            dragStartTranslateY = translateY;
            mapContainer.style.cursor = 'grabbing';
            hideTooltip();
        }

        function onMouseMove(e) {
            if (!isDragging) return;
            translateX = dragStartTranslateX + (e.clientX - dragStartX);
            translateY = dragStartTranslateY + (e.clientY - dragStartY);
            updateTransform();
        }

        function onMouseUp() { isDragging = false; mapContainer.style.cursor = 'grab'; }
        function resetView() {
            if (imgLoaded) {
                scale = 1.0;
                const rect = mapContainer.getBoundingClientRect();
                translateX = (rect.width - imgNaturalWidth) / 2;
                translateY = (rect.height - imgNaturalHeight) / 2;
                updateTransform();
                hideTooltip();
            }
        }

        mapContainer.addEventListener('wheel', handleWheel, { passive: false });
        mapContainer.addEventListener('mousedown', onMouseDown);
        window.addEventListener('mousemove', onMouseMove);
        window.addEventListener('mouseup', onMouseUp);
        zoomLabel.addEventListener('click', resetView);
        mapContainer.style.cursor = 'grab';
        document.addEventListener('click', hideTooltipOnEmptyClick);

        mapContainer.addEventListener('dragover', (e) => e.preventDefault());
        mapContainer.addEventListener('drop', (e) => {
            e.preventDefault();
            if (!imgLoaded) { alert('Сначала загрузите карту!'); return; }
            const rawData = e.dataTransfer.getData('text/plain');
            if (rawData) {
                const iconData = JSON.parse(rawData);
                const rect = mapContainer.getBoundingClientRect();
                const screenX = e.clientX - rect.left;
                const screenY = e.clientY - rect.top;
                const imgCoords = screenToImage(screenX, screenY);
                const x = Math.min(Math.max(imgCoords.x, 10), imgNaturalWidth - 10);
                const y = Math.min(Math.max(imgCoords.y, 10), imgNaturalHeight - 10);
                addButtonToMap(x, y, iconData.name, iconData.tag, iconData.description, iconData.iconUrl, iconData.extraText || '', iconData.showExtraText || false);
            }
        });

        document.getElementById('addMapBtn').addEventListener('click', () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/jpeg,image/png';
            input.onchange = (e) => { if (e.target.files[0]) loadMap(e.target.files[0]); };
            input.click();
        });

        document.getElementById('addMarkBtn').addEventListener('click', () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/jpeg,image/png,image/svg+xml';
            input.multiple = true;
            input.onchange = async (e) => {
                const files = Array.from(e.target.files);
                if (files.length > 0) {
                    for (const file of files) {
                        const reader = new FileReader();
                        const iconUrl = await new Promise((resolve) => {
                            reader.onload = (event) => resolve(event.target.result);
                            reader.readAsDataURL(file);
                        });
                        
                        iconItems.push({
                            id: nextIconId++,
                            iconUrl: iconUrl,
                            name: file.name.split('.')[0],
                            description: '',
                            tag: '',

                    renderIconsGrid();
                }
            };
            input.click();

        document.getElementById('addTagBtnMenu').addEventListener('click', () => {
            const tagName = prompt('Введите название тега (макс 8 символов):');
            if (tagName && tagName.trim() && tagName.trim().length <= 8 && !availableTags.includes(tagName.trim())) {
                availableTags.push(tagName.trim());

        });

        document.getElementById('modalSave').addEventListener('click', saveCurrentButton);
        document.getElementById('modalCancel').addEventListener('click', closeModal);
        document.getElementById('deleteButtonBtn').addEventListener('click', () => { if (currentEditingButton && confirm('Удалить?')) deleteButton(currentEditingButton.id); });

        function generateViewerHTML(data) {
            const dataStr = JSON.stringify(data);
            return `<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Интерактивная карта - Просмотр</title>
<style>

*{margin:0;padding:0;box-sizing:border-box;user-select:none;}

.app-container{display:flex;width:100%;height:100%;}

.map-button{position:absolute;cursor:pointer;background:transparent;border:none;display:flex;align-items:center;justify-content:center;transition:transform 0.2s cubic-bezier(0.34,1.56,0.64,1);z-index:20;filter:drop-shadow(0 4px 8px rgba(0,0,0,0.3));}
.map-button:hover{transform:scale(1.2) translateY(-5px);z-index:30;}
.map-button img{width:90%;height:90%;object-fit:contain;pointer-events:none;}
.map-button.hidden{display:none;}
.custom-tooltip{position:fixed;background:rgba(30,41,59,0.9);backdrop-filter:blur(12px);border:1px solid var(--border-color);border-radius:16px;padding:16px;max-width:300px;min-width:200px;z-index:1000;box-shadow:0 20px 25px -5px rgba(0,0,0,0.2);pointer-events:none;animation:tooltipAppear 0.2s ease-out;}
@keyframes tooltipAppear{from{opacity:0;transform:translateY(10px) scale(0.95);}to{opacity:1;transform:translateY(0) scale(1);}}
.custom-tooltip .tooltip-title{font-size:1.125rem;font-weight:700;color:#ff8c42;text-align:center;margin-bottom:8px;word-wrap:break-word;}
.custom-tooltip .tooltip-divider{height:1px;background:var(--border-color);margin:12px 0;}
.custom-tooltip .tooltip-desc{font-size:0.875rem;color:var(--text-secondary);line-height:1.5;word-wrap:break-word;white-space:pre-line;}
.custom-tooltip .tooltip-extra{margin-top:16px;padding:10px;font-size:0.8125rem;color:var(--accent-color);word-break:break-word;cursor:pointer;transition:var(--transition);display:flex;align-items:center;justify-content:center;gap:6px;width:100%;text-align:center;border-radius:8px;background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.2);}

</style>
</head>
<body>
<div class="app-container">
<div class="sidebar">
    <div class="tags-section">
        <div class="menu-header">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>

<div class="map-container" id="mapContainer"><div class="map-viewport" id="mapViewport"><img class="map-image" id="mapImage" draggable="false"><div class="buttons-layer" id="buttonsLayer"></div></div></div>
</div>
<script>
const mapData = ${dataStr};
let scale=1,translateX=0,translateY=0,isDragging=false,dragStartX=0,dragStartY=0,dragStartTranslateX=0,dragStartTranslateY=0,imgNaturalWidth=1,imgNaturalHeight=1,tagCheckState=mapData.tagCheckState||{},availableTags=mapData.availableTags||[],activeTooltip=null,activeButton=null,isPinned=false;
const mapContainer=document.getElementById("mapContainer"),mapImage=document.getElementById("mapImage"),buttonsLayer=document.getElementById("buttonsLayer"),zoomLabel=document.getElementById("zoomStatusLabel");
function copyToClipboard(text){navigator.clipboard.writeText(text).then(()=>{const toast=document.createElement('div');toast.innerHTML=(text.length>40?text.substring(0,40)+'...':text);toast.style.position='fixed';toast.style.bottom='32px';toast.style.left='50%';toast.style.transform='translateX(-50%) translateY(20px)';toast.style.backgroundColor='var(--sidebar-bg)';toast.style.color='var(--text-primary)';toast.style.padding='12px 24px';toast.style.borderRadius='12px';toast.style.zIndex='3000';toast.style.fontSize='0.875rem';toast.style.fontWeight='600';toast.style.boxShadow='0 20px 25px -5px rgba(0,0,0,0.2)';toast.style.border='1px solid var(--border-color)';toast.style.pointerEvents='none';toast.style.transition='all 0.3s cubic-bezier(0.4,0,0.2,1)';toast.style.opacity='0';document.body.appendChild(toast);requestAnimationFrame(()=>{toast.style.transform='translateX(-50%) translateY(0)';toast.style.opacity='1';});setTimeout(()=>{toast.style.transform='translateX(-50%) translateY(20px)';toast.style.opacity='0';setTimeout(()=>toast.remove(),300);},2000);}).catch(()=>alert('Ошибка копирования'));}
function hideTooltip(){if(activeTooltip){activeTooltip.remove();activeTooltip=null;activeButton=null;}isPinned=false;}
function showTooltip(btnData,mouseX,mouseY,isClick){if(activeTooltip&&activeButton!==btnData&&!isClick)hideTooltip();if(isClick&&activeButton===btnData&&activeTooltip){hideTooltip();return;}if(isClick&&activeButton!==btnData)hideTooltip();var tooltip=document.createElement("div");tooltip.className="custom-tooltip";var title=document.createElement("div");title.className="tooltip-title";title.textContent=btnData.name||"Метка";var divider=document.createElement("div");divider.className="tooltip-divider";var desc=document.createElement("div");desc.className="tooltip-desc";desc.textContent=btnData.description||"Нет описания";tooltip.appendChild(title);tooltip.appendChild(divider);tooltip.appendChild(desc);if(btnData.showExtraText&&btnData.extraText&&btnData.extraText.trim()!==''){var extra=document.createElement("div");extra.className="tooltip-extra";extra.innerHTML='<span>'+btnData.extraText+'</span>';extra.title="Нажмите, чтобы скопировать";extra.addEventListener("click",(e)=>{e.stopPropagation();copyToClipboard(btnData.extraText);});tooltip.appendChild(extra);}document.body.appendChild(tooltip);var tr=tooltip.getBoundingClientRect();var left=mouseX+15,top=mouseY-tr.height/2;if(left+tr.width>innerWidth)left=mouseX-tr.width-15;if(top<0)top=5;if(top+tr.height>innerHeight)top=innerHeight-tr.height-5;tooltip.style.left=left+"px";tooltip.style.top=top+"px";activeTooltip=tooltip;activeButton=btnData;if(isClick){isPinned=true;tooltip.style.pointerEvents='auto';}}
mapImage.src=mapData.mapBase64;
mapImage.onload=function(){imgNaturalWidth=mapImage.naturalWidth;imgNaturalHeight=mapImage.naturalHeight;var rect=mapContainer.getBoundingClientRect();translateX=(rect.width-imgNaturalWidth)/2;translateY=(rect.height-imgNaturalHeight)/2;updateTransform();renderButtons();};
function renderButtons(){buttonsLayer.innerHTML="";for(var i=0;i<mapData.buttons.length;i++){var btn=mapData.buttons[i];var div=document.createElement("div");div.className="map-button";var shouldShow=btn.tag===""||tagCheckState[btn.tag]!==false;if(!shouldShow)div.classList.add("hidden");var size=btn.size||50;div.style.width=size+"px";div.style.height=size+"px";var img=document.createElement("img");img.src=btn.iconUrl;div.appendChild(img);div.style.position="absolute";(function(btnData){div.addEventListener("mouseenter",function(e){if(!isPinned){var rect=div.getBoundingClientRect();showTooltip(btnData,rect.left+rect.width/2,rect.top,false);}});div.addEventListener("mouseleave",function(){if(!isPinned)hideTooltip();});div.addEventListener("click",function(e){e.stopPropagation();var rect=div.getBoundingClientRect();showTooltip(btnData,rect.left+rect.width/2,rect.top,true);});})(btn);buttonsLayer.appendChild(div);btn.element=div;}updateButtonsPosition();}
function updateButtonsPosition(){for(var i=0;i<mapData.buttons.length;i++){var btn=mapData.buttons[i];if(btn.element){var pos=imageToScreen(btn.x,btn.y);var size=btn.size||50;btn.element.style.left=(pos.x-size/2)+"px";btn.element.style.top=(pos.y-size)+"px";btn.element.style.width=size+"px";btn.element.style.height=size+"px";}}}
function imageToScreen(imgX,imgY){return{x:imgX*scale+translateX,y:imgY*scale+translateY};}
function updateTransform(){scale=Math.min(3,Math.max(0.5,scale));mapImage.style.transform="translate("+translateX+"px, "+translateY+"px) scale("+scale+")";zoomLabel.innerText="Zoom: "+scale.toFixed(2)+"x";updateButtonsPosition();}
function handleWheel(e){e.preventDefault();var delta=-e.deltaY;var zoomFactor=delta>0?1.08:0.93;var ns=scale*zoomFactor;ns=Math.min(3,Math.max(0.5,ns));if(ns===scale)return;var rect=mapContainer.getBoundingClientRect();var mx=e.clientX-rect.left,my=e.clientY-rect.top;var ix=(mx-translateX)/scale,iy=(my-translateY)/scale;scale=ns;translateX=mx-ix*scale;translateY=my-iy*scale;updateTransform();}
function onMouseDown(e){if(e.button!==0)return;e.preventDefault();isDragging=true;dragStartX=e.clientX;dragStartY=e.clientY;dragStartTranslateX=translateX;dragStartTranslateY=translateY;mapContainer.style.cursor="grabbing";hideTooltip();}
function onMouseMove(e){if(!isDragging)return;translateX=dragStartTranslateX+(e.clientX-dragStartX);translateY=dragStartTranslateY+(e.clientY-dragStartY);updateTransform();}
function onMouseUp(){isDragging=false;mapContainer.style.cursor="grab";}
function resetView(){scale=1.0;var rect=mapContainer.getBoundingClientRect();translateX=(rect.width-imgNaturalWidth)/2;translateY=(rect.height-imgNaturalHeight)/2;updateTransform();hideTooltip();}
mapContainer.addEventListener("wheel",handleWheel,{passive:false});mapContainer.addEventListener("mousedown",onMouseDown);window.addEventListener("mousemove",onMouseMove);window.addEventListener("mouseup",onMouseUp);zoomLabel.addEventListener("click",resetView);mapContainer.style.cursor="grab";document.addEventListener("click",function(e){if(!e.target.closest(".map-button"))hideTooltip();});
function renderTagsMenu(){var tagsList=document.getElementById("tagsList");tagsList.innerHTML="";if(availableTags.length===0){tagsList.innerHTML='<div class="empty-message">Нет тегов</div>';return;}for(var i=0;i<availableTags.length;i++){var tag=availableTags[i];var isChecked=tagCheckState[tag]!==false;var itemDiv=document.createElement("div");itemDiv.className="filter-item";var infoDiv=document.createElement("div");infoDiv.className="filter-info";var cb=document.createElement("input");cb.type="checkbox";cb.checked=isChecked;(function(tagName){cb.addEventListener("change",function(e){tagCheckState[tagName]=e.target.checked;for(var j=0;j<mapData.buttons.length;j++){var btn=mapData.buttons[j];if(btn.element){var shouldShow=btn.tag===""||tagCheckState[btn.tag]!==false;if(shouldShow)btn.element.classList.remove("hidden");else btn.element.classList.add("hidden");}}});})(tag);var label=document.createElement("label");label.textContent=tag;infoDiv.appendChild(cb);infoDiv.appendChild(label);itemDiv.appendChild(infoDiv);tagsList.appendChild(itemDiv);}}
renderTagsMenu();
<\/script>
</body>
</html>`;
        }

        document.getElementById('exportBtn').addEventListener('click', () => {
            if (!currentMapBase64) { alert('Сначала загрузите карту!'); return; }
            const exportData = {
                mapBase64: currentMapBase64,
                buttons: buttonsData.map(btn => ({ x: btn.x, y: btn.y, name: btn.name, tag: btn.tag, description: btn.description, size: btn.size, iconUrl: btn.iconUrl, extraText: btn.extraText || '', showExtraText: btn.showExtraText || false })),
                availableTags: availableTags,
                tagCheckState: tagCheckState,
                iconItems: iconItems
            };
            const viewerHTML = generateViewerHTML(exportData);
            const blob = new Blob([viewerHTML], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            const fileName = prompt('Введите название файла:', 'map_export.html');
            if (fileName) {
                a.href = url;
                a.download = fileName.endsWith('.html') ? fileName : fileName + '.html';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            }
            URL.revokeObjectURL(url);
        });

        document.getElementById('importBtn').addEventListener('click', () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.html';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const content = event.target.result;
                        const match = content.match(/const mapData = (\{[\s\S]*?\});/);
                        if (match) {
                            try {
                                const importedData = JSON.parse(match[1]);
                                if (importedData.mapBase64) {
                                    currentMapBase64 = importedData.mapBase64;
                                    mapImage.src = currentMapBase64;
                                    mapImage.onload = () => {
                                        imgNaturalWidth = mapImage.naturalWidth;
                                        imgNaturalHeight = mapImage.naturalHeight;
                                        imgLoaded = true;
                                        mapImage.style.display = 'block';
                                        mapEmpty.style.display = 'none';
                                        mapLoaded.style.display = 'block';
                                        buttonsData.forEach(btn => btn.element?.remove());
                                        buttonsData = [];
                                        iconItems = [];
                                        availableTags = importedData.availableTags || [];
                                        tagCheckState = importedData.tagCheckState || {};
                                        if (importedData.iconItems && importedData.iconItems.length > 0) {
                                            iconItems = importedData.iconItems;
                                            nextIconId = Math.max(...iconItems.map(i => i.id), 0) + 1;
                                        } else {
                                            const uniqueIcons = new Map();
                                            importedData.buttons.forEach(btn => {
                                                if (!uniqueIcons.has(btn.iconUrl)) {
                                                    uniqueIcons.set(btn.iconUrl, { id: nextIconId++, iconUrl: btn.iconUrl, name: btn.name, description: btn.description, tag: btn.tag, extraText: btn.extraText || '', showExtraText: btn.showExtraText || false });
                                                }
                                            });
                                            iconItems = Array.from(uniqueIcons.values());
                                        }
                                        importedData.buttons.forEach(btn => {
                                            const newBtn = { ...btn, id: nextId++, element: null, extraText: btn.extraText || '', showExtraText: btn.showExtraText || false };
                                            const element = createButtonElement(newBtn);
                                            newBtn.element = element;
                                            buttonsLayer.appendChild(element);
                                            buttonsData.push(newBtn);
                                        });
                                        renderTagsMenu();
                                        updateTagSelect();
                                        renderIconsGrid();
                                        updateFilter();
                                        scale = 1.0;
                                        const rect = mapContainer.getBoundingClientRect();
                                        translateX = (rect.width - imgNaturalWidth) / 2;
                                        translateY = (rect.height - imgNaturalHeight) / 2;
                                        updateTransform();
                                    };
                                }
                            } catch (err) { alert('Ошибка импорта: ' + err.message); }
                        } else alert('Неверный формат файла');
                    };
                    reader.readAsText(file);
                }
            };
            input.click();
        });

        renderTagsMenu();
        updateTagSelect();
        renderIconsGrid();
    </script>
</body>
